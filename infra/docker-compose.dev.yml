# LOCAL TESTING ONLY — mirrors the prod topology minus TLS/certbot, plus
# Mailpit to catch every email the pipeline sends. Never deploy this file.
# Run from infra/:  docker compose -f docker-compose.dev.yml up -d

services:
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/wgc.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ../page:/usr/share/nginx/wgc/page:ro
      - ../widget/dist:/usr/share/nginx/wgc/dist:ro
      - ../qa/fixtures:/usr/share/nginx/wgc/qa:ro
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678" # dev only: prod never publishes the editor
    environment:
      - N8N_ENCRYPTION_KEY=dev-only-encryption-key-not-for-prod
      - WEBHOOK_URL=http://localhost:8080/hook/
      - GENERIC_TIMEZONE=America/Chicago
      - TZ=America/Chicago
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs
      - N8N_SECURE_COOKIE=false # editor over plain http://localhost
      - WGC_HMAC_SECRET=dev-only-hmac-secret-not-for-prod
      - LEADSIMPLE_API_KEY=
      - PARSE_ADDRESS=parse@localhost.test
      - NOTIFY_EMAILS=jon@localhost.test,ashley@localhost.test,youssef@localhost.test
      - ALERT_EMAIL=alert@localhost.test
      - MAIL_FROM=pipeline@localhost.test
    volumes:
      - n8n_dev_data:/home/node/.n8n
      - ../n8n/mapping:/home/node/.n8n/wgc:ro

  # Catches ALL pipeline email (parse-path, notifications, alerts).
  # UI: http://localhost:8025 — SMTP: mailpit:1025, no auth, no TLS.
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  n8n_dev_data:
