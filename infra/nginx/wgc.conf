# wgcassetguide.com — single-domain layout (S3-A1).
# Public surface: /hook/token, /hook/lead, /embed.js, /analysis. Nothing else
# reaches n8n; the editor UI has no public location (SSH tunnel only).

# Per-IP rate limit: a human fills one form; 6/min is generous, bots hit the
# wall. Rejects return a success-shaped 200 (no-oracle rule, G-3).
limit_req_zone $binary_remote_addr zone=lead:10m rate=6r/m;

server {
    listen 80;
    server_name wgcassetguide.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name wgcassetguide.com;

    ssl_certificate /etc/letsencrypt/live/wgcassetguide.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wgcassetguide.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Non-guessable n8n webhook segment (TD-3): sets $wgc_hook_id.
    # hook_id.conf is generated from .env by infra/backup/render-hook-id.sh
    # and never committed.
    include /etc/nginx/snippets/hook_id.conf;

    # Success-shaped body for rate-limited requests: identical to the real
    # success response so limiting is invisible to probes.
    error_page 503 =200 @limited;
    location @limited {
        default_type application/json;
        return 200 '{"ok":true}';
    }

    location = /hook/token {
        limit_req zone=lead burst=5 nodelay;
        limit_req_status 503;
        proxy_pass http://n8n:5678/webhook/$wgc_hook_id/token;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 15s;
    }

    location = /hook/lead {
        limit_req zone=lead burst=5 nodelay;
        limit_req_status 503;
        client_max_body_size 32k; # canonical payload is ~2k; cap abuse
        proxy_pass http://n8n:5678/webhook/$wgc_hook_id/lead;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 15s;
    }

    # Anything else under /hook/ (probing for other webhooks) gets the same
    # opaque success.
    location /hook/ {
        default_type application/json;
        return 200 '{"ok":true}';
    }

    location = /embed.js {
        alias /usr/share/nginx/wgc/dist/embed.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=300"; # 5 min: hotfix latency stays low
        gzip on;
        gzip_types application/javascript;
    }

    # Previous build kept for instant rollback (runbook: swap alias target).
    location = /embed.prev.js {
        alias /usr/share/nginx/wgc/dist/embed.prev.js;
        default_type application/javascript;
        add_header Cache-Control "no-store";
    }

    location = /analysis {
        alias /usr/share/nginx/wgc/page/analysis.html;
        default_type text/html;
        # iframe fallback embedding allowed only from the two known hosts.
        add_header Content-Security-Policy "frame-ancestors 'self' https://westromgroup.com https://www.westromgroup.com" always;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        return 404;
    }
}
