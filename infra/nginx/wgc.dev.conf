# LOCAL TESTING ONLY — same routing and rate-limit behavior as wgc.conf,
# without TLS. Webhook segment is fixed to "dev-hook" (matches the import
# step in qa/local-testing.md).

limit_req_zone $binary_remote_addr zone=lead:10m rate=6r/m;

server {
    listen 80;
    server_name localhost;

    # Success-shaped body on rate limit — identical to prod (G-3 no-oracle).
    error_page 503 =200 @limited;
    location @limited {
        default_type application/json;
        return 200 '{"ok":true}';
    }

    location = /hook/token {
        limit_req zone=lead burst=5 nodelay;
        limit_req_status 503;
        proxy_pass http://n8n:5678/webhook/dev-hook/token;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 15s;
    }

    location = /hook/lead {
        limit_req zone=lead burst=5 nodelay;
        limit_req_status 503;
        client_max_body_size 32k;
        proxy_pass http://n8n:5678/webhook/dev-hook/lead;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 15s;
    }

    location /hook/ {
        default_type application/json;
        return 200 '{"ok":true}';
    }

    location = /embed.js {
        alias /usr/share/nginx/wgc/dist/embed.js;
        default_type application/javascript;
        add_header Cache-Control "no-store"; # dev: always fresh
    }

    location = /analysis {
        alias /usr/share/nginx/wgc/page/analysis.html;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    # QA fixture for G-5/G-7 (served same-origin locally).
    location = /hostile-host.html {
        alias /usr/share/nginx/wgc/qa/hostile-host.html;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    location / {
        return 404;
    }
}
