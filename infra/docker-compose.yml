# Single-VPS stack (S3-A1): nginx (public) + certbot + n8n (localhost-only).
# The n8n editor binds to 127.0.0.1 on the host, reachable only from the
# server itself or an SSH tunnel — never from the internet.
# Image tags: [VERIFY-AT-BUILD] pin current stable digests at deploy time.

# Fixed project name so volume names (wgc_certbot_certs etc.) match the
# pre-start certbot command in the deploy runbook.
name: wgc

services:
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/wgc.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/hook_id.conf:/etc/nginx/snippets/hook_id.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - ../page:/usr/share/nginx/wgc/page:ro
      - ../widget/dist:/usr/share/nginx/wgc/dist:ro
    depends_on:
      - n8n

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done'

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    # Bound to the server's localhost ONLY: invisible from the internet,
    # reachable via `ssh -L 5678:127.0.0.1:5678 root@server`.
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY} # REQUIRES-HUMAN-AUTHORIZATION: generate once, back up offline
      - WEBHOOK_URL=https://wgcassetguide.com/hook/
      - GENERIC_TIMEZONE=America/Chicago
      - TZ=America/Chicago
      # 7-day PII prune (PRD NFR-Privacy). [VERIFY-AT-BUILD: var names vs current n8n docs]
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      # Code nodes need crypto (token HMAC) and fs (mapping + metrics).
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs
      # Workflows read config (WGC_HMAC_SECRET, mail addresses) via $env;
      # newer n8n blocks that by default. Confirmed needed 2026-07-12 (dev).
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - WGC_HMAC_SECRET=${WGC_HMAC_SECRET}
      - LEADSIMPLE_API_KEY=${LEADSIMPLE_API_KEY:-}
      - PARSE_ADDRESS=${PARSE_ADDRESS}
      - NOTIFY_EMAILS=${NOTIFY_EMAILS}
      - ALERT_EMAIL=${ALERT_EMAIL}
      - MAIL_FROM=${MAIL_FROM}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/mapping:/home/node/.n8n/wgc:ro

volumes:
  n8n_data:
  certbot_webroot:
  certbot_certs:
